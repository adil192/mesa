upstream_project_url: https://gitlab.freedesktop.org/mesa/mesa.git
upstream_tag_template: mesa-{version}

jobs:
  - job: pull_from_upstream
    upstream_tag_include: "^mesa-25\\.3\\..*$"
    trigger: release
    dist_git_branches:
      - rawhide

  - job: pull_from_upstream
    upstream_tag_include: "^mesa-25\\.3\\..*$"
    trigger: release
    dist_git_branches:
      - f43

  - job: koji_build
    trigger: commit
    dist_git_branches:
      - fedora-all

  # The bodhi_update job is not configured as it is not possible to configure or
  # disable karma:
  # https://github.com/packit/packit-service/issues/2757
  # - job: bodhi_update
  #   trigger: commit
  #   dist_git_branches:
  #     - fedora-branched
